name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: |
          set -e

          mkdir -p "dist/${{ matrix.goos }}"

          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -o "dist/${{ matrix.goos }}/gototp${EXT}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gototp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ matrix.goos }}/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/linux/*
            dist/windows/*
            dist/darwin/*